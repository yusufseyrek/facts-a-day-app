# Search Screen Screenshot Flow
# Captures the search/browse screen with category grid

appId: dev.seyrek.factsaday

---
# Navigate to search tab
- tapOn:
    text: "Search"
    retryTapIfNoChange: true

# Wait for categories to load
- extendedWaitUntil:
    visible:
      id: "discover-category-0"
    timeout: 1000

# Wait for animations to settle
- waitForAnimationToEnd:
    timeout: 1000

# Take screenshot
- takeScreenshot: ${OUTPUT_DIR}/04_discover
