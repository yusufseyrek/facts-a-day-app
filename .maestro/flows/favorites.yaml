# Favorites Screen Screenshot Flow (frame 08)
# Captures the saved/favorite facts screen (works offline). Navigates via deep
# link (locale-proof).

appId: dev.seyrek.factsaday

---
# Open the Favorites tab via deep link (expo-router route /favorites)
- openLink: factsaday://favorites

# Wait for favorites content to load (optional — may be an empty state)
- extendedWaitUntil:
    visible:
      id: "fact-card-.*"
    timeout: 8000
    optional: true

# Wait for images and animations to settle
- waitForAnimationToEnd:
    timeout: 2000

# Take screenshot
- takeScreenshot: ${OUTPUT_DIR}/08_favorites
