# Trivia Hub Screen Screenshot Flow (frame 06)
# Captures the trivia hub (stats hero with accuracy ring + all-time rank, and
# the game-mode tiles). Navigates via deep link (locale-proof).

appId: dev.seyrek.factsaday

---
# Open the Trivia tab via deep link (expo-router route /trivia)
- openLink: factsaday://trivia

# Wait for the trivia hub stats hero to load
- extendedWaitUntil:
    visible:
      id: "trivia-stats-hero"
    timeout: 8000

# Wait for animations (accuracy ring, hero counters)
- waitForAnimationToEnd:
    timeout: 2000

# Take screenshot
- takeScreenshot: ${OUTPUT_DIR}/06_trivia
