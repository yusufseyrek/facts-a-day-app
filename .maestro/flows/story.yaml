# Story Screen Screenshot Flow (frame 02)
# Captures the full-screen immersive story view ("behind the headlines" hero).
# Prefers a themed event-collection story; falls back to the always-present Mix
# story when no event theme is seeded on the capture DB. Assumes we are on Home
# (after launch or the previous flow). Selectors are testIDs, so locale-proof.

appId: dev.seyrek.factsaday

---
# Let Home settle (e.g. after a closed modal from a prior flow)
- waitForAnimationToEnd:
    timeout: 2000

# Wait for the story-button row to load
- extendedWaitUntil:
    visible:
      id: "story-button-.*"
    timeout: 8000

# Prefer a themed event-collection story — the strongest "behind the headlines"
# visual. story-button-theme:<slug> sits right after Mix when a theme is active.
- tapOn:
    id: "story-button-theme:.*"
    index: 0
    optional: true
    retryTapIfNoChange: true

# Give the story view a moment to open if a theme button was tapped
- waitForAnimationToEnd:
    timeout: 2000

# Fall back to the always-present Mix story when no event theme opened
- runFlow:
    when:
      notVisible:
        id: "story-content"
    commands:
      - tapOn:
          id: "story-button-mix"
          retryTapIfNoChange: true

# Wait for story content (full-bleed image + text overlay)
- extendedWaitUntil:
    visible:
      id: "story-content"
    timeout: 8000

# Wait for image render + Ken Burns animation to settle
- waitForAnimationToEnd:
    timeout: 3000

# Take screenshot
- takeScreenshot: ${OUTPUT_DIR}/02_story

# Close story - iOS uses close button, Android uses back key
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          id: "story-close-button"
          retryTapIfNoChange: true
      - waitForAnimationToEnd:
          timeout: 1000

- runFlow:
    when:
      platform: Android
    commands:
      - pressKey: back
      - waitForAnimationToEnd:
          timeout: 1000
