# Main Screenshot Orchestration Flow
# Runs all screen flows in sequence to capture promotional screenshots.
#
# IMPORTANT: Use the capture.sh script for proper folder structure!
#   ./marketing/scripts/capture.sh --ios --locale en
#
# The OUTPUT_DIR env var MUST be passed via -e flag.
#
# Story order (8 frames): home -> story -> fact detail -> search -> category
# browse -> trivia hub -> leaderboard -> favorites. Navigation between tabs uses
# factsaday:// deep links inside the per-screen flows (the NativeTabs labels are
# localized + rendered natively, so tab-text taps are NOT locale-proof).

appId: dev.seyrek.factsaday

---
# Launch the app with locale override
# arguments are passed as -key value to the app process on iOS
- launchApp:
    clearState: false
    clearKeychain: false
    arguments:
      AppleLanguages: '(${LOCALE})'
      AppleLocale: '${FULL_LOCALE}'

# Wait for locale change and app restart to settle
- waitForAnimationToEnd:
    timeout: 20000

# Wait for initial Home content to load — gate on fact cards (locale-proof, no
# tab text) rather than the localized "Home" label.
- extendedWaitUntil:
    visible:
      id: 'fact-card-.*'
    timeout: 20000

# Extended wait for all animations, image loading, and list settling.
# Prevents kAXErrorInvalidUIElement errors from FlashList recycling.
- waitForAnimationToEnd:
    timeout: 5000

# Run all screen flows in sequence.
# Frames 01-03 start from Home; 04-08 self-navigate via deep link.

# 01. Home feed (already on home after launch)
- runFlow: flows/home.yaml

# 02. Story view (themed "behind the headlines" hero, Mix fallback)
- runFlow: flows/story.yaml

# 03. Fact detail (opens a fact card modal from home)
- runFlow: flows/fact-detail.yaml

# 04. Search / Discover (deep link -> /search)
- runFlow: flows/discover.yaml

# 05. Category browse (taps a category on search)
- runFlow: flows/category-browse.yaml

# 06. Trivia hub (deep link -> /trivia)
- runFlow: flows/trivia.yaml

# 07. Leaderboard (deep link -> /trivia/leaderboard)
- runFlow: flows/leaderboard.yaml

# 08. Favorites (deep link -> /favorites)
- runFlow: flows/favorites.yaml
